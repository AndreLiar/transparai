name: CD

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      - '.github/workflows/cd.yml'

jobs:
  # ── 1. Backend CI gate ────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        working-directory: ./Backend
        run: npm ci --legacy-peer-deps

      - name: Lint (non-blocking — warnings only)
        working-directory: ./Backend
        run: npm run lint || true

      - name: Run tests
        working-directory: ./Backend
        run: npm test

      - name: Security audit
        working-directory: ./Backend
        run: npm audit --audit-level=high --legacy-peer-deps

  # ── 2. Build & push Docker image ─────────────────────────────────────────
  docker-build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: backend-ci
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/transparai-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy Backend to Render ──────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: docker-build
    environment: production

    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null \
            -w "HTTP status: %{http_code}\n"
