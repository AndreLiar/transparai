name: CD

on:
  push:
    branches: [main]
    paths:
      - 'Backend/**'
      - '.github/workflows/cd.yml'

jobs:
  # ── 1. Backend CI gate ────────────────────────────────────────────────────
  backend-ci:
    name: Backend CI gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install dependencies
        working-directory: ./Backend
        run: npm ci --legacy-peer-deps

      - name: Lint (non-blocking — warnings only)
        working-directory: ./Backend
        run: npm run lint || true

      - name: Run tests
        working-directory: ./Backend
        run: npm test

      - name: Security audit
        working-directory: ./Backend
        run: npm audit --audit-level=high --legacy-peer-deps

  # ── 2. Build & push Docker image ─────────────────────────────────────────
  docker-build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: backend-ci
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/transparai-backend
          tags: |
            type=sha,prefix=sha-,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./Backend
          file: ./Backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy Backend to Render ──────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render
    runs-on: ubuntu-latest
    needs: docker-build
    environment: production

    steps:
      - name: Trigger deploy and wait for live
        run: |
          SERVICE_ID="srv-d1gnffbipnbc73avheog"
          API_KEY="${{ secrets.RENDER_API_KEY }}"

          # Trigger the deploy
          DEPLOY=$(curl -s -X POST "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}')

          DEPLOY_ID=$(echo "$DEPLOY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "Deploy triggered: $DEPLOY_ID"

          # Poll every 15s, max 10 minutes (40 attempts)
          for i in $(seq 1 40); do
            sleep 15
            STATUS=$(curl -s "https://api.render.com/v1/services/${SERVICE_ID}/deploys/${DEPLOY_ID}" \
              -H "Authorization: Bearer ${API_KEY}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "[$i/40] Status: $STATUS"
            if [ "$STATUS" = "live" ]; then
              echo "✅ Deploy is live!"
              exit 0
            fi
            if [ "$STATUS" = "failed" ] || [ "$STATUS" = "canceled" ]; then
              echo "❌ Deploy $STATUS"
              exit 1
            fi
          done

          echo "❌ Timeout: deploy did not go live within 10 minutes"
          exit 1
